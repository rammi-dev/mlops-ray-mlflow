{{- if .Values.jupyterhub.enabled }}
# ── Hub needs to create/delete RayCluster CRs in ds-workloads ─────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jupyter-hub
  namespace: {{ .Values.global.namespace.workloads }}
  labels:
    {{- include "kyper.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jupyter-ray-manager
  namespace: {{ .Values.global.namespace.workloads }}
  labels:
    {{- include "kyper.labels" . | nindent 4 }}
rules:
  # Manage per-user RayClusters
  - apiGroups: ["ray.io"]
    resources: ["rayclusters"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  # Manage notebook user pods
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets", "events"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jupyter-ray-manager
  namespace: {{ .Values.global.namespace.workloads }}
  labels:
    {{- include "kyper.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jupyter-ray-manager
subjects:
  - kind: ServiceAccount
    name: hub
    namespace: {{ .Values.global.namespace.platform }}
{{- end }}
