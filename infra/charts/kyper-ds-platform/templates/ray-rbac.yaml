{{- if .Values.kuberayOperator.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ray-worker
  namespace: {{ .Values.global.namespace.workloads | default "ds-workloads" }}
  labels:
    {{- include "kyper.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ray-cluster-autoscaler
  namespace: {{ .Values.global.namespace.workloads | default "ds-workloads" }}
  labels:
    {{- include "kyper.labels" . | nindent 4 }}
rules:
  - apiGroups: ["ray.io"]
    resources: ["rayclusters"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ray-cluster-autoscaler
  namespace: {{ .Values.global.namespace.workloads | default "ds-workloads" }}
  labels:
    {{- include "kyper.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ray-cluster-autoscaler
subjects:
  - kind: ServiceAccount
    name: ray-worker
    namespace: {{ .Values.global.namespace.workloads | default "ds-workloads" }}
{{- end }}
