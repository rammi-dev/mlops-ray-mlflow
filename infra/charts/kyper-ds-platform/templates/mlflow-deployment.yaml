{{- if .Values.mlflow.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: {{ .Values.global.namespace.platform }}
  labels:
    {{- include "kyper.labels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
spec:
  replicas: {{ .Values.mlflow.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: mlflow
    spec:
      {{- with .Values.mlflow.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mlflow
          image: "{{ .Values.mlflow.image.repository }}:{{ .Values.mlflow.image.tag }}"
          command: ["mlflow"]
          args:
            - server
            - --host=0.0.0.0
            - --port=5000
            - --serve-artifacts
            - --allowed-hosts=*
            - --artifacts-destination={{ .Values.mlflow.artifactRoot }}
            - --backend-store-uri=postgresql+psycopg2://$(DB_USER):$(DB_PASS)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "kyper.name" . }}-mlflow-pg-app
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "kyper.name" . }}-mlflow-pg-app
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "kyper.name" . }}-mlflow-pg-app
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "kyper.name" . }}-mlflow-pg-app
                  key: user
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "kyper.name" . }}-mlflow-pg-app
                  key: password
          ports:
            - name: http
              containerPort: 5000
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
          resources:
            {{- toYaml .Values.mlflow.resources | nindent 12 }}
          {{- if .Values.mlflow.artifactVolume.enabled }}
          volumeMounts:
            - name: artifacts
              mountPath: /mlflow/artifacts
          {{- end }}
      {{- if .Values.mlflow.artifactVolume.enabled }}
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: mlflow-artifacts
      {{- end }}
{{- end }}
